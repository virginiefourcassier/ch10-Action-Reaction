<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Principe d'action-réaction</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }
    #scene {
      position: relative;
      width: 900px;
      height: 600px;
      margin: 0 auto;
      border: 1px solid #ccc;
      overflow: hidden;
      background: #ffffff;
    }
    /* projectile (balle/jet de gaz) */
    #projectile {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #8adf3c;
      left: 430px;  /* à peu près au centre */
      top: 450px;   /* près des pieds du cow-boy futur */
    }
  </style>

</head>
<body>
  <div id="scene">
        <div id="projectile"></div>

    <!-- On ajoutera le cow-boy, la fusée et le projectile ici -->
  </div>
  <script>
    const projectile = document.getElementById('projectile');

    // paramètres de la trajectoire
    const startX = 430;      // position de départ (x)
    const startY = 450;      // position de départ (y)
    const amplitudeX = 300;  // distance parcourue horizontalement
    const amplitudeY = 180;  // hauteur maximale de la « cloche »
    const duration = 2000;   // durée de l'animation en millisecondes

    function animateProjectile() {
      const startTime = performance.now();

      function step(now) {
        const t = (now - startTime) / duration; // t entre 0 et 1

        if (t <= 1) {
          // Avancement horizontal linéaire
          const x = startX + amplitudeX * t;
          // Trajectoire en cloche (parabole simple)
          const y = startY - (4 * amplitudeY * t * (1 - t));

          projectile.style.left = x + 'px';
          projectile.style.top = y + 'px';

          requestAnimationFrame(step);
        } else {
          // retour à la position de départ
          projectile.style.left = startX + 'px';
          projectile.style.top = startY + 'px';
        }
      }

      requestAnimationFrame(step);
    }

    // lance l'animation au chargement de la page
    window.addEventListener('load', animateProjectile);
  </script>

</body>
</html>
