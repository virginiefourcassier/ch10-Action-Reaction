<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Principe d'action-réaction</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    #scene {
      position: relative;
      width: 900px;
      height: 750px;
      margin: 0 auto;
      border: 1px solid #ccc;
      overflow: hidden;
      background: #ffffff;
    }

    #controls {
      width: 900px;
      margin: 10px auto 0 auto;
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      font-size: 18px;
      align-items: center;
    }

    #controls input {
      transform: scale(1.3);
      margin-right: 6px;
    }

    #btnPlay {
      padding: 6px 14px;
      font-size: 16px;
      cursor: pointer;
    }

    #projectile {
      position: absolute;
      width: 150px;
      height: auto;
      left: 430px;
      top: 520px;
      transform-origin: center center;
      z-index: 5;
    }

    #cowboy {
      position: absolute;
      width: 240px;
      height: auto;
      bottom: 0px;
      right: 40px;
    }

    #rocket {
      position: absolute;
      width: 660px;
      height: auto;
      bottom: 0px;
      left: 0px;
    }

    #signature {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }

    .arrow {
      position: absolute;
      width: 10px;
      transform-origin: center top;
      display: none;
      z-index: 10;
    }

    .arrow::after {
      content: "";
      position: absolute;
      left: -9px;
      bottom: -12px;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
    }

    .arrow-red {
      background: red;
    }
    .arrow-red::after {
      border-top: 12px solid red;
    }

    .arrow-green {
      background: #00aa00;
    }
    .arrow-green::after {
      border-top: 12px solid #00aa00;
    }

    #arrowRocket,
    #arrowRocketR {
      height: 160px;
    }

    #arrowGunLeft,
    #arrowGunRight,
    #arrowGunLeftR,
    #arrowGunRightR {
      height: 45px;
    }

    #arrowBalloon,
    #arrowBalloonR {
      height: 40px;
    }
  </style>
</head>
<body>

  <div id="controls">
    <button id="btnPlay">Play</button>
    <label><input type="checkbox" id="chkAction"> Action</label>
    <label><input type="checkbox" id="chkReaction"> Réaction</label>
  </div>

  <div id="scene">
    <img id="cowboy" src="cowboy.png" alt="Cow-boy">
    <img id="rocket" src="rocket.png" alt="Fusée">

    <!-- Flèches rouges (action) -->
    <div id="arrowRocket" class="arrow arrow-red"></div>
    <div id="arrowGunLeft" class="arrow arrow-red"></div>
    <div id="arrowGunRight" class="arrow arrow-red"></div>
    <div id="arrowBalloon" class="arrow arrow-red"></div>

    <!-- Flèches vertes (réaction) -->
    <div id="arrowRocketR" class="arrow arrow-green"></div>
    <div id="arrowGunLeftR" class="arrow arrow-green"></div>
    <div id="arrowGunRightR" class="arrow arrow-green"></div>
    <div id="arrowBalloonR" class="arrow arrow-green"></div>

    <img id="projectile" src="balloon.PNG" alt="Ballon">
  </div>

  <div id="signature">
    Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse
  </div>

  <script>
    const scene = document.getElementById('scene');
    const projectile = document.getElementById('projectile');
    const chkAction = document.getElementById('chkAction');
    const chkReaction = document.getElementById('chkReaction');
    const btnPlay = document.getElementById('btnPlay');
    const cowboy = document.getElementById('cowboy');
    const rocket = document.getElementById('rocket');

    const arrowRocket = document.getElementById('arrowRocket');
    const arrowGunLeft = document.getElementById('arrowGunLeft');
    const arrowGunRight = document.getElementById('arrowGunRight');
    const arrowBalloon = document.getElementById('arrowBalloon');

    const arrowRocketR = document.getElementById('arrowRocketR');
    const arrowGunLeftR = document.getElementById('arrowGunLeftR');
    const arrowGunRightR = document.getElementById('arrowGunRightR');
    const arrowBalloonR = document.getElementById('arrowBalloonR');

    const duration = 3500;

    const initialProjectile = {
      left: parseFloat(getComputedStyle(projectile).left),
      top:  parseFloat(getComputedStyle(projectile).top),
      width: parseFloat(getComputedStyle(projectile).width)
    };
    const initialRocket = {
      left: parseFloat(getComputedStyle(rocket).left),
      bottom: parseFloat(getComputedStyle(rocket).bottom)
    };
    const initialCowboy = {
      bottom: parseFloat(getComputedStyle(cowboy).bottom)
    };

    let isPlaying = false;
    let animationFrameId = null;

    function resetScene() {
      projectile.style.left = initialProjectile.left + 'px';
      projectile.style.top = initialProjectile.top + 'px';
      projectile.style.width = initialProjectile.width + 'px';
      projectile.style.transform = 'rotate(0rad)';

      rocket.style.left = initialRocket.left + 'px';
      rocket.style.bottom = initialRocket.bottom + 'px';
      rocket.style.opacity = '1';

      cowboy.style.bottom = initialCowboy.bottom + 'px';
      cowboy.src = 'cowboy.png';

      [
        arrowRocket, arrowGunLeft, arrowGunRight, arrowBalloon,
        arrowRocketR, arrowGunLeftR, arrowGunRightR, arrowBalloonR
      ].forEach(a => a.style.display = 'none');
    }

    function stopAnimation() {
      isPlaying = false;
      btnPlay.textContent = 'Play';
      if (animationFrameId !== null) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
    }

    function startCycle() {
      const startTime = performance.now();
      const randomOffsetX = (Math.random() - 0.5) * 100;
      const randomOffsetY = Math.random() * 50;

      function step(now) {
        if (!isPlaying) return;

        const t = (now - startTime) / duration;

        if (t <= 1) {
          // ===== Fusée =====
          const rocketTravel = 500;
          const rocketBottom = initialRocket.bottom + rocketTravel * t;
          rocket.style.bottom = rocketBottom + 'px';
          rocket.style.opacity = String(1 - 0.4 * t);

          // ===== Cow-boy =====
          let cowboyBottom;
          if (t < 0.25) {
            const localT = t / 0.25;
            const wobble = Math.sin(localT * Math.PI * 4) * 5;
            cowboyBottom = initialCowboy.bottom + wobble;
            cowboy.src = 'cowboy.png';
          } else {
            const localT = (t - 0.25) / 0.75;
            const jump = 90 * (1 - Math.pow(2 * localT - 1, 2));
            cowboyBottom = initialCowboy.bottom + jump;
            cowboy.src = localT < 0.5 ? 'cowboy.png' : 'cowboy2.png';
          }
          cowboy.style.bottom = cowboyBottom + 'px';

          // ===== Ballon =====
          let x, y, size;
          const rise = 180;
          if (t < 0.5) {
            const localT = t / 0.5;
            x = initialProjectile.left;
            y = initialProjectile.top - rise * localT;
            size = initialProjectile.width * (1 - 0.2 * localT);
            projectile.style.transform = 'rotate(0rad)';
          } else {
            const localT = (t - 0.5) / 0.5;
            const fallY = initialProjectile.top - rise + (250 + randomOffsetY) * localT;
            const zigzagAmplitude = 40;
            const zigzag = Math.sin(localT * Math.PI * 4) * zigzagAmplitude;

            x = initialProjectile.left + randomOffsetX + zigzag;
            y = fallY;
            size = initialProjectile.width * (1 - 0.8 * localT);
          }
          const clampedSize = Math.max(size, 8);
          projectile.style.left = x + 'px';
          projectile.style.top = y + 'px';
          projectile.style.width = clampedSize + 'px';

          const sceneRect = scene.getBoundingClientRect();

          if (chkAction.checked || chkReaction.checked) {
            // === Fusée =====
            const rocketRect = rocket.getBoundingClientRect();
            const rocketCenterX = rocketRect.left + rocketRect.width / 2 - sceneRect.left;
            const rocketArrowHeight = parseFloat(getComputedStyle(arrowRocket).height);
            const rocketBaseY = rocketRect.bottom - sceneRect.top - 0.55 * rocketArrowHeight;

            if (chkAction.checked) {
              arrowRocket.style.left = (rocketCenterX - 5) + 'px';
              arrowRocket.style.top = rocketBaseY + 'px';
              arrowRocket.style.transform = 'rotate(0rad)';
              arrowRocket.style.display = 'block';
            } else arrowRocket.style.display = 'none';

            if (chkReaction.checked) {
              arrowRocketR.style.left = (rocketCenterX - 5) + 'px';
              arrowRocketR.style.top = rocketBaseY + 'px';
              arrowRocketR.style.transform = 'rotate(3.14159rad)';
              arrowRocketR.style.display = 'block';
            } else arrowRocketR.style.display = 'none';

            // === Pistolets ===
            const cowboyRect = cowboy.getBoundingClientRect();
            const cowboyBottomY = cowboyRect.bottom - sceneRect.top;
            const cowboyCenterX = cowboyRect.left + cowboyRect.width / 2 - sceneRect.left;
            const gunOffsetX = 55;
            const gunArrowHeight = parseFloat(getComputedStyle(arrowGunLeft).height);
            const leftGunX = cowboyCenterX - gunOffsetX;
            const rightGunX = cowboyCenterX + gunOffsetX;
            const gunBaseY = cowboyBottomY - 1.5 * gunArrowHeight;

            if (t < 0.7) {
              if (chkAction.checked) {
                arrowGunLeft.style.display = 'block';
                arrowGunRight.style.display = 'block';
                arrowGunLeft.style.left = (leftGunX - 5) + 'px';
                arrowGunLeft.style.top = gunBaseY + 'px';
                arrowGunLeft.style.transform = 'rotate(0rad)';
                arrowGunRight.style.left = (rightGunX - 5) + 'px';
                arrowGunRight.style.top = gunBaseY + 'px';
                arrowGunRight.style.transform = 'rotate(0rad)';
              } else {
                arrowGunLeft.style.display = 'none';
                arrowGunRight.style.display = 'none';
              }

              if (chkReaction.checked) {
                arrowGunLeftR.style.display = 'block';
                arrowGunRightR.style.display = 'block';
                arrowGunLeftR.style.left = (leftGunX - 5) + 'px';
                arrowGunLeftR.style.top = gunBaseY + 'px';
                arrowGunLeftR.style.transform = 'rotate(3.14159rad)';
                arrowGunRightR.style.left = (rightGunX - 5) + 'px';
                arrowGunRightR.style.top = gunBaseY + 'px';
                arrowGunRightR.style.transform = 'rotate(3.14159rad)';
              } else {
                arrowGunLeftR.style.display = 'none';
                arrowGunRightR.style.display = 'none';
              }
            } else {
              arrowGunLeft.style.display = 'none';
              arrowGunRight.style.display = 'none';
              arrowGunLeftR.style.display = 'none';
              arrowGunRightR.style.display = 'none';
            }

            // === Ballon : base sur le nœud en montée ET en descente ===
            const projRect = projectile.getBoundingClientRect();
            const projCenterX = projRect.left + projRect.width / 2 - sceneRect.left;
            const projCenterY = projRect.top + projRect.height / 2 - sceneRect.top;
            const knotOffsetY = projRect.height * 0.25; // nœud sous le centre
            const knotX = projCenterX;
            const knotY = projCenterY + knotOffsetY;

            if (t < 0.5) {
              if (chkAction.checked) {
                arrowBalloon.style.display = 'block';
                arrowBalloon.style.left = (knotX - 5) + 'px';
                arrowBalloon.style.top = knotY + 'px';
                arrowBalloon.style.transform = 'rotate(0rad)';
              } else arrowBalloon.style.display = 'none';

              if (chkReaction.checked) {
                arrowBalloonR.style.display = 'block';
                arrowBalloonR.style.left = (knotX - 5) + 'px';
                arrowBalloonR.style.top = knotY + 'px';
                arrowBalloonR.style.transform = 'rotate(3.14159rad)';
              } else arrowBalloonR.style.display = 'none';

              projectile.style.transform = 'rotate(0rad)';
            } else {
              const dt = 0.01;
              const tAhead = Math.min(t + dt, 1);
              let xAhead, yAhead;

              if (tAhead < 0.5) {
                const localT = tAhead / 0.5;
                xAhead = initialProjectile.left;
                yAhead = initialProjectile.top - rise * localT;
              } else {
                const localT = (tAhead - 0.5) / 0.5;
                const fallY2 = initialProjectile.top - rise + (250 + randomOffsetY) * localT;
                const zigzagAmplitude2 = 40;
                const zigzag2 = Math.sin(localT * Math.PI * 4) * zigzagAmplitude2;
                xAhead = initialProjectile.left + randomOffsetX + zigzag2;
                yAhead = fallY2;
              }

              const dx = xAhead - x;
              const dy = yAhead - y;
              const angleMove = Math.atan2(dy, dx);
              const angleRed = angleMove + Math.PI;
              const angleGreen = angleMove;

              if (chkAction.checked) {
                arrowBalloon.style.display = 'block';
                arrowBalloon.style.left = (knotX - 5) + 'px';
                arrowBalloon.style.top = knotY + 'px';
                arrowBalloon.style.transform = 'rotate(' + angleRed + 'rad)';
              } else arrowBalloon.style.display = 'none';

              if (chkReaction.checked) {
                arrowBalloonR.style.display = 'block';
                arrowBalloonR.style.left = (knotX - 5) + 'px';
                arrowBalloonR.style.top = knotY + 'px';
                arrowBalloonR.style.transform = 'rotate(' + angleGreen + 'rad)';
              } else arrowBalloonR.style.display = 'none';

              projectile.style.transform = 'rotate(' + angleRed + 'rad)';
            }
          } else {
            [
              arrowRocket, arrowGunLeft, arrowGunRight, arrowBalloon,
              arrowRocketR, arrowGunLeftR, arrowGunRightR, arrowBalloonR
            ].forEach(a => a.style.display = 'none');
          }

          animationFrameId = requestAnimationFrame(step);
        } else {
          if (isPlaying) {
            resetScene();
            startCycle();
          } else {
            stopAnimation();
          }
        }
      }

      animationFrameId = requestAnimationFrame(step);
    }

    function playAnimation() {
      if (isPlaying) {
        stopAnimation();
        return;
      }
      isPlaying = true;
      btnPlay.textContent = 'Stop';
      resetScene();
      startCycle();
    }

    btnPlay.addEventListener('click', playAnimation);
    resetScene();
  </script>

</body>
</html>
