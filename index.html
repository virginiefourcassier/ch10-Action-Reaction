<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Principe d'action-réaction</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }
    #scene {
      position: relative;
      width: 900px;
      height: 600px;
      margin: 0 auto;
      border: 1px solid #ccc;
      overflow: hidden;
      background: #ffffff;
    }
#controls {
  width: 900px;
  margin: 10px auto 0 auto;
  display: flex;
  justify-content: flex-end;
  gap: 20px;
  font-size: 18px;
  align-items: center;      /* nouvel alignement vertical */
}

#controls input {
  transform: scale(1.3);
  margin-right: 6px;
}

#btnPlay {
  padding: 6px 14px;
  font-size: 16px;
  cursor: pointer;
}


    /* projectile (balle/jet de gaz) */
    #projectile {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #8adf3c;
      left: 430px;  /* à peu près au centre */
      top: 450px;   /* près des pieds du cow-boy futur */
    }
      #cowboy {
      position: absolute;
      width: 240px;   /* 160 × 1,5 */
      height: auto;
      bottom: 0px;
      right: 40px;
    }

     #rocket {
      position: absolute;
      width: 660px;   /* 440 × 1,5 */
      height: auto;
      top: 0px;
      left: 0px;
    }




        #signature {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }

  </style>

</head>
<body>
  <div id="controls">
    <button id="btnPlay">Play</button>
    <label><input type="checkbox" id="chkAction" checked> Action</label>
    <label><input type="checkbox" id="chkReaction"> Réaction</label>
  </div>


  
  <div id="scene">
           <img id="cowboy" src="cowboy.png" alt="Cow-boy">
    <img id="rocket" src="rocket.png" alt="Fusée">

    <div id="projectile"></div>

    <!-- On ajoutera le cow-boy, la fusée et le projectile ici -->
  </div>
    
  <div id="signature">
    Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse
  </div>

   <script>
    // Récupération des éléments de la page
    const projectile = document.getElementById('projectile');
    const chkAction = document.getElementById('chkAction');
    const chkReaction = document.getElementById('chkReaction');

    // Paramètres communs pour la trajectoire du projectile (balle / ballon)
    const startX = 430;
    const startY = 450;
    const amplitudeX = 300;
    const amplitudeY = 180;
    const duration = 2000; // durée d'une animation en millisecondes

    // Animation 1 : trajectoire en cloche (ACTION)
    function animateProjectileAction(callback) {
      const startTime = performance.now();

      function step(now) {
        const t = (now - startTime) / duration; // t évolue de 0 à 1

        if (t <= 1) {
          // Mouvement horizontal (vers la droite)
          const x = startX + amplitudeX * t;
          // Mouvement vertical en cloche (parabole simple)
          const y = startY - (4 * amplitudeY * t * (1 - t));

          projectile.style.left = x + 'px';
          projectile.style.top = y + 'px';
          projectile.style.width = '20px';
          projectile.style.height = '20px';

          requestAnimationFrame(step);
        } else {
          // Retour à la position initiale
          projectile.style.left = startX + 'px';
          projectile.style.top = startY + 'px';
          // Si une fonction de rappel est fournie, on la déclenche
          if (callback) callback();
        }
      }

      requestAnimationFrame(step);
    }

    // Animation 2 : ballon qui se dégonfle (RÉACTION)
    function animateProjectileDeflate(callback) {
      const startTime = performance.now();

      function step(now) {
        const t = (now - startTime) / duration;

        if (t <= 1) {
          // Légère translation (par exemple vers la gauche et le haut)
          const x = startX - amplitudeX * t * 0.3;
          const y = startY - amplitudeY * t * 0.2;

          // Taille qui diminue progressivement (ballon qui se dégonfle)
          const size = 20 * (1 - t);          // de 20px à 0
          const clampedSize = Math.max(size, 2); // on évite 0 pour rester visible

          projectile.style.left = x + 'px';
          projectile.style.top = y + 'px';
          projectile.style.width = clampedSize + 'px';
          projectile.style.height = clampedSize + 'px';

          requestAnimationFrame(step);
        } else {
          // Retour à la position initiale et taille normale
          projectile.style.left = startX + 'px';
          projectile.style.top = startY + 'px';
          projectile.style.width = '20px';
          projectile.style.height = '20px';
          if (callback) callback();
        }
      }

      requestAnimationFrame(step);
    }

    // Fonction qui décide quoi animer en fonction des cases cochées
    function playAnimation() {
      const wantAction = chkAction.checked;
      const wantReaction = chkReaction.checked;

      // Cas 1 : rien n'est coché → rien ne se passe
      if (!wantAction && !wantReaction) {
        return;
      }

      // Cas 2 : seulement Action
      if (wantAction && !wantReaction) {
        animateProjectileAction();
        return;
      }

      // Cas 3 : seulement Réaction
      if (!wantAction && wantReaction) {
        animateProjectileDeflate();
        return;
      }

      // Cas 4 : les deux cochées → on enchaîne Action puis Réaction
      if (wantAction && wantReaction) {
        animateProjectileAction(() => {
          // petite pause entre les deux
          setTimeout(() => {
            animateProjectileDeflate();
          }, 500);
        });
      }
    }

    // On relance l'animation à chaque clic sur une case
    chkAction.addEventListener('change', playAnimation);
    chkReaction.addEventListener('change', playAnimation);

    // On lance une première fois au chargement (avec l'état initial des cases)
    window.addEventListener('load', playAnimation);
  </script>



</body>
</html>
