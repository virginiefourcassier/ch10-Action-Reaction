<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Principe d'action-réaction</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }
    #scene {
      position: relative;
      width: 900px;
      height: 600px;
      margin: 0 auto;
      border: 1px solid #ccc;
      overflow: hidden;
      background: #ffffff;
    }
    /* projectile (balle/jet de gaz) */
    #projectile {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #8adf3c;
      left: 430px;  /* à peu près au centre */
      top: 450px;   /* près des pieds du cow-boy futur */
    }
      #cowboy {
      position: absolute;
      width: 240px;   /* 160 × 1,5 */
      height: auto;
      bottom: 0px;
      right: 40px;
    }

     #rocket {
      position: absolute;
      width: 660px;   /* 440 × 1,5 */
      height: auto;
      top: 0px;
      left: 0px;
    }




        #signature {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }

  </style>

</head>
<body>
  <div id="scene">
           <img id="cowboy" src="cowboy.png" alt="Cow-boy">
    <img id="rocket" src="rocket.png" alt="Fusée">

    <div id="projectile"></div>

    <!-- On ajoutera le cow-boy, la fusée et le projectile ici -->
  </div>
    <div id="signature">
    Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse
  </div>

  <script>
    const projectile = document.getElementById('projectile');

    // paramètres communs
    const startX = 430;
    const startY = 450;
    const amplitudeX = 300;
    const amplitudeY = 180;
    const duration = 2000;

    // animation 1 : trajectoire en cloche (balle éjectée)
    function animateProjectileAction() {
      const startTime = performance.now();

      function step(now) {
        const t = (now - startTime) / duration;

        if (t <= 1) {
          const x = startX + amplitudeX * t;
          const y = startY - (4 * amplitudeY * t * (1 - t));

          projectile.style.left = x + 'px';
          projectile.style.top = y + 'px';
          projectile.style.width = '20px';
          projectile.style.height = '20px';

          requestAnimationFrame(step);
        } else {
          projectile.style.left = startX + 'px';
          projectile.style.top = startY + 'px';
        }
      }

      requestAnimationFrame(step);
    }

    // animation 2 : ballon qui se dégonfle (taille diminue)
    function animateProjectileDeflate() {
      const startTime = performance.now();

      function step(now) {
        const t = (now - startTime) / duration;

        if (t <= 1) {
          // déplacement léger vers la gauche (ou vers le haut) pour suggérer le jet de gaz
          const x = startX - amplitudeX * t * 0.3;
          const y = startY - amplitudeY * t * 0.2;

          // taille qui diminue progressivement
          const size = 20 * (1 - t); // de 20px à 0
          const clampedSize = Math.max(size, 2); // on évite de descendre à 0

          projectile.style.left = x + 'px';
          projectile.style.top = y + 'px';
          projectile.style.width = clampedSize + 'px';
          projectile.style.height = clampedSize + 'px';

          requestAnimationFrame(step);
        } else {
          // fin : ballon presque disparu, on le remet en position initiale
          projectile.style.left = startX + 'px';
          projectile.style.top = startY + 'px';
          projectile.style.width = '20px';
          projectile.style.height = '20px';
        }
      }

      requestAnimationFrame(step);
    }

    // pour l'instant, on teste les deux animations l'une après l'autre
    window.addEventListener('load', () => {
      animateProjectileAction();
      setTimeout(animateProjectileDeflate, duration + 500);
    });
  </script>


</body>
</html>
