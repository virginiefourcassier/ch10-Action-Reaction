<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Principe d'action-réaction</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }
    #scene {
      position: relative;
      width: 900px;
      height: 600px;
      margin: 0 auto;
      border: 1px solid #ccc;
      overflow: hidden;
      background: #ffffff;
    }
#controls {
  width: 900px;
  margin: 10px auto 0 auto;
  display: flex;
  justify-content: flex-end;
  gap: 20px;
  font-size: 18px;
  align-items: center;      /* nouvel alignement vertical */
}

#controls input {
  transform: scale(1.3);
  margin-right: 6px;
}

#btnPlay {
  padding: 6px 14px;
  font-size: 16px;
  cursor: pointer;
}


    /* projectile (balle/jet de gaz) */
    #projectile {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #8adf3c;
      left: 430px;  /* à peu près au centre */
      top: 450px;   /* près des pieds du cow-boy futur */
    }
      #cowboy {
      position: absolute;
      width: 240px;   /* 160 × 1,5 */
      height: auto;
      bottom: 0px;
      right: 40px;
    }

     #rocket {
      position: absolute;
      width: 660px;   /* 440 × 1,5 */
      height: auto;
      top: 0px;
      left: 0px;
    }




        #signature {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }

  </style>

</head>
<body>
  <div id="controls">
    <button id="btnPlay">Play</button>
    <label><input type="checkbox" id="chkAction" checked> Action</label>
    <label><input type="checkbox" id="chkReaction"> Réaction</label>
  </div>


  
  <div id="scene">
           <img id="cowboy" src="cowboy.png" alt="Cow-boy">
    <img id="rocket" src="rocket.png" alt="Fusée">

    <div id="projectile"></div>

    <!-- On ajoutera le cow-boy, la fusée et le projectile ici -->
  </div>
    
  <div id="signature">
    Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse
  </div>

     <script>
    // ===== RÉFÉRENCES AUX ÉLÉMENTS HTML =====
    const projectile = document.getElementById('projectile');   // ballon / balle
    const chkAction = document.getElementById('chkAction');     // case "Action"
    const chkReaction = document.getElementById('chkReaction'); // case "Réaction"
    const btnPlay = document.getElementById('btnPlay');         // bouton Play/Stop
    const cowboy = document.getElementById('cowboy');           // image du cow-boy
    const rocket = document.getElementById('rocket');           // image de la fusée

    // ===== PARAMÈTRES GÉNÉRAUX =====
    // Positions initiales mémorisées (on les lit une fois au début)
    const initialProjectile = { 
      left: parseFloat(getComputedStyle(projectile).left),
      top:  parseFloat(getComputedStyle(projectile).top)
    };
    const initialCowboy = {
      left: cowboy ? parseFloat(getComputedStyle(cowboy).left || 0) : 0,
      top:  cowboy ? parseFloat(getComputedStyle(cowboy).top || 0)  : 0,
      bottom: cowboy ? parseFloat(getComputedStyle(cowboy).bottom || 0) : 0
    };
    const initialRocket = {
      left: parseFloat(getComputedStyle(rocket).left),
      top:  parseFloat(getComputedStyle(rocket).top)
    };

    // Durée d'une séquence d'animation (en ms)
    const duration = 2500;

    // Variable d'état : est‑ce qu’une animation est en cours ?
    let isPlaying = false;
    let animationFrameId = null; // pour pouvoir arrêter requestAnimationFrame si besoin

    // ===== OUTILS =====

    // Fonction utilitaire pour remettre tous les objets à leur position/taille initiales
    function resetScene() {
      // Ballon / projectile
      projectile.style.left = initialProjectile.left + 'px';
      projectile.style.top = initialProjectile.top + 'px';
      projectile.style.width = '20px';
      projectile.style.height = '20px';

      // Fusée
      rocket.style.left = initialRocket.left + 'px';
      rocket.style.top = initialRocket.top + 'px';

      // Cow-boy (on le replace par rapport au bas de la scène)
      cowboy.style.bottom = initialCowboy.bottom + 'px';
    }

    // Fonction pour arrêter proprement l'animation en cours
    function stopAnimation() {
      isPlaying = false;
      btnPlay.textContent = 'Play';
      if (animationFrameId !== null) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
      resetScene();
    }

    // ===== ANIMATION PRINCIPALE =====

    function playAnimation() {
      // Si une animation tourne déjà, on la stoppe (effet Play/Stop)
      if (isPlaying) {
        stopAnimation();
        return;
      }

      isPlaying = true;
      btnPlay.textContent = 'Stop';

      const startTime = performance.now();
      const wantAction = chkAction.checked;
      const wantReaction = chkReaction.checked;

      // On mémorise une petite variation aléatoire pour la chute du ballon (réaction)
      const randomOffsetX = (Math.random() - 0.5) * 100; // léger décalage latéral
      const randomOffsetY = (Math.random() * 50);        // variation de profondeur

      function step(now) {
        if (!isPlaying) {
          // Si l'utilisateur a cliqué sur Stop au milieu
          return;
        }

        const t = (now - startTime) / duration; // t de 0 à 1

        if (t <= 1) {
          // ----- ACTION : ce qui "agit" (flèches viendront ensuite) -----
          if (wantAction) {
            // Fusée qui monte verticalement
            const rocketY = initialRocket.top - 250 * t;
            rocket.style.top = rocketY + 'px';

            // Cow-boy qui monte verticalement (on joue sur bottom)
            const cowboyBottom = initialCowboy.bottom + 120 * t;
            cowboy.style.bottom = cowboyBottom + 'px';
          }

          // ----- RÉACTION : ce qui "réagit" (ballon / gaz) -----
          if (wantReaction) {
            // Ballon qui se dégonfle et tombe au sol avec un peu d'aléatoire
            // Phase 0 → 0,5 : ballon reste près du cow-boy, commence à se dégonfler
            // Phase 0,5 → 1 : chute vers le bas
            let x, y, size;
            if (t < 0.5) {
              const localT = t / 0.5; // 0 à 1
              x = initialProjectile.left + randomOffsetX * localT;
              y = initialProjectile.top - 40 * localT;
              size = 20 * (1 - 0.5 * localT); // de 20 à 10 px
            } else {
              const localT = (t - 0.5) / 0.5; // 0 à 1
              x = initialProjectile.left + randomOffsetX;
              y = initialProjectile.top - 40 + (200 + randomOffsetY) * localT;
              size = 10 * (1 - localT); // de 10 à 0
            }

            const clampedSize = Math.max(size, 2);
            projectile.style.left = x + 'px';
            projectile.style.top = y + 'px';
            projectile.style.width = clampedSize + 'px';
            projectile.style.height = clampedSize + 'px';
          }

          // On demande la frame suivante
          animationFrameId = requestAnimationFrame(step);
        } else {
          // Fin de l'animation
          stopAnimation();
        }
      }

      // On remet la scène à zéro et on lance la première frame
      resetScene();
      animationFrameId = requestAnimationFrame(step);
    }

    // ===== ÉCOUTEURS D'ÉVÉNEMENTS =====

    // Clic sur Play → lance ou arrête l'animation
    btnPlay.addEventListener('click', playAnimation);

    // Si on change les cases Action/Réaction alors que ça joue, on relance proprement
    chkAction.addEventListener('change', () => {
      if (isPlaying) {
        stopAnimation();
        playAnimation();
      }
    });

    chkReaction.addEventListener('change', () => {
      if (isPlaying) {
        stopAnimation();
        playAnimation();
      }
    });
  </script>



</body>
</html>
