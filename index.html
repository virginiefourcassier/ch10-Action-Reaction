<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Principe d'action-réaction</title>

  <!-- ===== DÉBUT STYLE ANIMATION ACTION/RÉACTION ===== -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    #scene {
      position: relative;
      width: 900px;
      height: 750px;          /* scène plus haute pour la fusée */
      margin: 0 auto;
      border: 1px solid #ccc;
      overflow: hidden;
      background: #ffffff;
    }

    #controls {
      width: 900px;
      margin: 10px auto 0 auto;
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      font-size: 18px;
      align-items: center;
    }

    #controls input {
      transform: scale(1.3);
      margin-right: 6px;
    }

    #btnPlay {
      padding: 6px 14px;
      font-size: 16px;
      cursor: pointer;
    }

    /* projectile (balle / ballon) : plus ovale */
    #projectile {
      position: absolute;
      width: 50px;           /* ovale horizontal */
      height: 35px;
      border-radius: 50%;
      background: #8adf3c;
      left: 430px;
      top: 520px;
    }

    #cowboy {
      position: absolute;
      width: 240px;
      height: auto;
      bottom: 0px;
      right: 40px;
    }

    /* fusée positionnée au sol au départ (bottom:0) */
    #rocket {
      position: absolute;
      width: 660px;
      height: auto;
      bottom: 0px;
      left: 0px;
    }

    #signature {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }

    /* ===== FLÈCHES D'ACTION (ROUGES) ===== */
    .arrow {
      position: absolute;
      width: 10px;              /* flèches épaisses */
      background: red;
      transform-origin: center top;
      display: none;            /* cachées par défaut */
    }

    .arrow::after {
      content: "";
      position: absolute;
      left: -9px;
      bottom: -12px;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 12px solid red; /* pointe vers le bas */
    }

    #arrowRocket {
      height: 160px;  /* longueur sous la fusée */
    }

    #arrowGunLeft,
    #arrowGunRight {
      height: 45px;   /* flèches pour les pistolets */
    }

    #arrowBalloon {
      height: 40px;   /* flèche pour le ballon */
    }
  </style>
  <!-- ===== FIN STYLE ANIMATION ACTION/RÉACTION ===== -->

</head>
<body>

  <div id="controls">
    <button id="btnPlay">Play</button>
    <!-- Action NON cochée au départ -->
    <label><input type="checkbox" id="chkAction"> Action</label>
    <label><input type="checkbox" id="chkReaction"> Réaction</label>
  </div>

  <div id="scene">
    <img id="cowboy" src="cowboy.png" alt="Cow-boy">
    <img id="rocket" src="rocket.png" alt="Fusée">

    <!-- Flèches rouges d'action -->
    <div id="arrowRocket" class="arrow"></div>
    <div id="arrowGunLeft" class="arrow"></div>
    <div id="arrowGunRight" class="arrow"></div>
    <div id="arrowBalloon" class="arrow"></div>

    <div id="projectile"></div>
  </div>

  <div id="signature">
    Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse
  </div>

  <!-- ===== DÉBUT SCRIPT ANIMATION ACTION/RÉACTION ===== -->
  <script>
    // ===== 1. RÉFÉRENCES AUX ÉLÉMENTS HTML =====
    const scene = document.getElementById('scene');
    const projectile = document.getElementById('projectile');   // ballon / balle
    const chkAction = document.getElementById('chkAction');     // case "Action"
    const chkReaction = document.getElementById('chkReaction'); // case "Réaction" (servira pour les flèches vertes)
    const btnPlay = document.getElementById('btnPlay');         // bouton Play/Stop
    const cowboy = document.getElementById('cowboy');           // image du cow-boy
    const rocket = document.getElementById('rocket');           // image de la fusée

    // Flèches d'action (rouges)
    const arrowRocket = document.getElementById('arrowRocket');
    const arrowGunLeft = document.getElementById('arrowGunLeft');
    const arrowGunRight = document.getElementById('arrowGunRight');
    const arrowBalloon = document.getElementById('arrowBalloon');

    // ===== 2. PARAMÈTRES GÉNÉRAUX =====
    const duration = 3500; // durée d'une séquence (ms), mouvement plutôt lent

    // Positions initiales mémorisées au chargement
    const initialProjectile = {
      left: parseFloat(getComputedStyle(projectile).left),
      top:  parseFloat(getComputedStyle(projectile).top)
    };
    const initialRocket = {
      left: parseFloat(getComputedStyle(rocket).left),
      bottom: parseFloat(getComputedStyle(rocket).bottom)  // fusée au sol
    };
    const initialCowboy = {
      bottom: parseFloat(getComputedStyle(cowboy).bottom)
    };

    let isPlaying = false;
    let animationFrameId = null;

    // ===== 3. OUTILS =====

    // Remise à zéro de la scène (état de départ d'un cycle)
    function resetScene() {
      // Ballon ovale
      projectile.style.left = initialProjectile.left + 'px';
      projectile.style.top = initialProjectile.top + 'px';
      projectile.style.width = '50px';
      projectile.style.height = '35px';

      // Fusée posée au sol
      rocket.style.left = initialRocket.left + 'px';
      rocket.style.bottom = initialRocket.bottom + 'px';
      rocket.style.opacity = '1';

      // Cow-boy au sol
      cowboy.style.bottom = initialCowboy.bottom + 'px';

      // flèches cachées (on les affichera uniquement si Action est coché ET animation en cours)
      arrowRocket.style.display = 'none';
      arrowGunLeft.style.display = 'none';
      arrowGunRight.style.display = 'none';
      arrowBalloon.style.display = 'none';
    }

    // Affiche ou cache les flèches rouges selon la case "Action"
    function updateActionArrowsVisibility() {
      const display = chkAction.checked ? 'block' : 'none';
      arrowRocket.style.display = display;
      arrowGunLeft.style.display = display;
      arrowGunRight.style.display = display;
      arrowBalloon.style.display = display;
    }

    // Stop : on arrête l'animation où elle est, sans reset
    function stopAnimation() {
      isPlaying = false;
      btnPlay.textContent = 'Play';
      if (animationFrameId !== null) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
    }

    // ===== 4. ANIMATION PRINCIPALE (mouvement + boucle) =====

    function startCycle() {
      const startTime = performance.now();

      // Aléatoire pour la chute du ballon (seconde phase)
      const randomOffsetX = (Math.random() - 0.5) * 100; // décalage latéral global
      const randomOffsetY = Math.random() * 50;          // variation de profondeur

      function step(now) {
        if (!isPlaying) return; // Stop cliqué

        const t = (now - startTime) / duration; // 0 → 1

        if (t <= 1) {
          // ----- FUSÉE : part du sol, disparaît vers le haut -----
          const rocketTravel = 500; // distance verticale parcourue
          const rocketBottom = initialRocket.bottom + rocketTravel * t;
          rocket.style.bottom = rocketBottom + 'px';
          rocket.style.opacity = String(1 - 0.4 * t);

          // ----- COW-BOY : vacille, monte plus haut, puis redescend -----
          let cowboyBottom;
          if (t < 0.25) {
            const localT = t / 0.25;
            const wobble = Math.sin(localT * Math.PI * 4) * 5; // ±5 px
            cowboyBottom = initialCowboy.bottom + wobble;
          } else {
            const localT = (t - 0.25) / 0.75;
            const jump = 90 * (1 - Math.pow(2 * localT - 1, 2)); // 90 px
            cowboyBottom = initialCowboy.bottom + jump;
          }
          cowboy.style.bottom = cowboyBottom + 'px';

          // ----- BALLON : montée lente puis chute en zigzag -----
          let x, y, size;
          if (t < 0.5) {
            // Phase 1 : montée lente, flèche verticale vers le bas
            const localT = t / 0.5;
            x = initialProjectile.left;
            y = initialProjectile.top - 70 * localT;  // montée un peu plus haute
            size = 50 * (1 - 0.2 * localT);          // 50 → 40 px
          } else {
            // Phase 2 : chute en zigzag, plus lente
            const localT = (t - 0.5) / 0.5;   // 0 → 1
            const fallY = initialProjectile.top - 70 + (250 + randomOffsetY) * localT;

            // zigzag horizontal (sinus) autour de randomOffsetX
            const zigzagAmplitude = 40;
            const zigzag = Math.sin(localT * Math.PI * 4) * zigzagAmplitude;

            x = initialProjectile.left + randomOffsetX + zigzag;
            y = fallY;

            size = 40 * (1 - localT); // 40 → 0 px
          }
          const clampedSize = Math.max(size, 2);
          projectile.style.left = x + 'px';
          projectile.style.top = y + 'px';
          projectile.style.width = clampedSize + 'px';
          projectile.style.height = (clampedSize * 0.7) + 'px'; // on garde l'ovale

          // ----- POSITIONNEMENT DES FLÈCHES (ACTION) -----
          if (chkAction.checked) {
            const sceneRect = scene.getBoundingClientRect();

            // 1) Flèche fusée : base réelle (au-dessus des flammes)
            const rocketRect = rocket.getBoundingClientRect();
            const rocketCenterX = rocketRect.left + rocketRect.width / 2 - sceneRect.left;

            const rocketArrowHeight = parseFloat(getComputedStyle(arrowRocket).height);
            // Décalage total : 1,8 hauteurs de flèche (ajusté plus bas déjà)
            const rocketBaseY = rocketRect.bottom - sceneRect.top - 1.8 * rocketArrowHeight;

            arrowRocket.style.left = (rocketCenterX - 5) + 'px';
            arrowRocket.style.top = rocketBaseY + 'px';

            // 2) Flèches pistolets : remontées de 1,5 hauteurs de flèches
            const cowboyRect = cowboy.getBoundingClientRect();
            const cowboyBottomY = cowboyRect.bottom - sceneRect.top;
            const cowboyCenterX = cowboyRect.left + cowboyRect.width / 2 - sceneRect.left;

            const gunOffsetX = 55;  // distance depuis le centre vers chaque pistolet
            const gunArrowHeight = parseFloat(getComputedStyle(arrowGunLeft).height);

            const leftGunX = cowboyCenterX - gunOffsetX;
            const rightGunX = cowboyCenterX + gunOffsetX;
            const gunBaseY = cowboyBottomY - 1.5 * gunArrowHeight;

            arrowGunLeft.style.left = (leftGunX - 5) + 'px';
            arrowGunLeft.style.top = gunBaseY + 'px';

            arrowGunRight.style.left = (rightGunX - 5) + 'px';
            arrowGunRight.style.top = gunBaseY + 'px';

            // 3) Flèche ballon
            const projRect = projectile.getBoundingClientRect();
            const projCenterX = projRect.left + projRect.width / 2 - sceneRect.left;
            const projCenterY = projRect.top + projRect.height / 2 - sceneRect.top;

            if (t < 0.5) {
              // Montée : flèche strictement verticale vers le bas
              arrowBalloon.style.left = (projCenterX - 5) + 'px';
              arrowBalloon.style.top = projCenterY + 'px';
              arrowBalloon.style.transform = 'rotate(0rad)';
            } else {
              // Descente : flèche opposée au mouvement instantané
              const dt = 0.01;
              const tAhead = Math.min(t + dt, 1);
              let xAhead, yAhead;

              if (tAhead < 0.5) {
                const localT = tAhead / 0.5;
                xAhead = initialProjectile.left;
                yAhead = initialProjectile.top - 70 * localT;
              } else {
                const localT = (tAhead - 0.5) / 0.5;
                const fallY2 = initialProjectile.top - 70 + (250 + randomOffsetY) * localT;
                const zigzagAmplitude2 = 40;
                const zigzag2 = Math.sin(localT * Math.PI * 4) * zigzagAmplitude2;
                xAhead = initialProjectile.left + randomOffsetX + zigzag2;
                yAhead = fallY2;
              }

              const dx = xAhead - x;
              const dy = yAhead - y;
              const angleMove = Math.atan2(dy, dx);
              const angleArrow = angleMove + Math.PI; // opposée au mouvement

              arrowBalloon.style.left = (projCenterX - 5) + 'px';
              arrowBalloon.style.top = projCenterY + 'px';
              arrowBalloon.style.transform = 'rotate(' + angleArrow + 'rad)';
            }

            // s'assurer que les flèches sont visibles si Action est coché
            updateActionArrowsVisibility();
          }

          animationFrameId = requestAnimationFrame(step);
        } else {
          // fin d'un cycle : si toujours en mode Play, on relance en boucle
          if (isPlaying) {
            resetScene();
            startCycle();
          } else {
            stopAnimation();
          }
        }
      }

      animationFrameId = requestAnimationFrame(step);
    }

    function playAnimation() {
      // Si déjà en lecture → Stop
      if (isPlaying) {
        stopAnimation();
        return;
      }
      isPlaying = true;
      btnPlay.textContent = 'Stop';

      resetScene();
      startCycle();
    }

    // ===== 5. ÉCOUTEURS D'ÉVÉNEMENTS =====
    btnPlay.addEventListener('click', playAnimation);

    // état initial : scène réinitialisée, flèches cachées
    resetScene();

    // cocher/décocher "Action" : flèches visibles uniquement quand Action est coché
    chkAction.addEventListener('change', () => {
      updateActionArrowsVisibility();
    });

    // La case "Réaction" servira pour les flèches vertes (à ajouter ensuite)
  </script>
  <!-- ===== FIN SCRIPT ANIMATION ACTION/RÉACTION ===== -->

</body>
</html>
