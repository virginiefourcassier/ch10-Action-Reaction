<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Principe d'action-réaction</title>

 <!-- ===== DEBUT STYLE ANIMATION ACTION/RÉACTION ===================================================================== -->  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }
    #scene {
      position: relative;
      width: 900px;
      height: 600px;
      margin: 0 auto;
      border: 1px solid #ccc;
      overflow: hidden;
      background: #ffffff;
    }
#controls {
  width: 900px;
  margin: 10px auto 0 auto;
  display: flex;
  justify-content: flex-end;
  gap: 20px;
  font-size: 18px;
  align-items: center;      /* nouvel alignement vertical */
}

#controls input {
  transform: scale(1.3);
  margin-right: 6px;
}

#btnPlay {
  padding: 6px 14px;
  font-size: 16px;
  cursor: pointer;
}


    /* projectile (balle/jet de gaz) */
    #projectile {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #8adf3c;
      left: 430px;  /* à peu près au centre */
      top: 450px;   /* près des pieds du cow-boy futur */
    }
      #cowboy {
      position: absolute;
      width: 240px;   /* 160 × 1,5 */
      height: auto;
      bottom: 0px;
      right: 40px;
    }

     #rocket {
      position: absolute;
      width: 660px;   /* 440 × 1,5 */
      height: auto;
      top: 0px;
      left: 0px;
    }




        #signature {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }
    /* ===== FLÈCHES D'ACTION (ROUGES) ===== */
    .arrow {
      position: absolute;
      width: 6px;              /* largeur du trait */
      background: red;
      transform-origin: center top;
    }

    .arrow::after {
      content: "";
      position: absolute;
      left: -7px;
      bottom: -10px;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid red; /* pointe de la flèche vers le bas */
    }

    #arrowRocket {
      height: 120px;  /* longueur sous la fusée */
    }

    #arrowGunLeft,
    #arrowGunRight {
      height: 60px;   /* flèches plus petites pour les pistolets */
    }

    #arrowBalloon {
      height: 40px;   /* flèche pour le ballon */
    }

  </style>

 <!-- ===== FIN STYLE ANIMATION ACTION/RÉACTION ===================================================================== -->

  
</head>
<body>
  <div id="controls">
    <button id="btnPlay">Play</button>
    <label><input type="checkbox" id="chkAction" checked> Action</label>
    <label><input type="checkbox" id="chkReaction"> Réaction</label>
  </div>


  
  <div id="scene">
           <img id="cowboy" src="cowboy.png" alt="Cow-boy">
    <img id="rocket" src="rocket.png" alt="Fusée">

    <!-- Flèches rouges d'action -->
    <div id="arrowRocket" class="arrow"></div>
    <div id="arrowGunLeft" class="arrow"></div>
    <div id="arrowGunRight" class="arrow"></div>
    <div id="arrowBalloon" class="arrow"></div>

    
    <div id="projectile"></div>

    <!-- On ajoutera le cow-boy, la fusée et le projectile ici -->
  </div>
    
  <div id="signature">
    Virginie Fourcassier – Lycée Pierre de Fermat – Toulouse
  </div>



 <!-- ===== DEBUT SCRIPT ANIMATION ACTION/RÉACTION ===================================================================== --> 
  
  <script>
    // ===== RÉFÉRENCES AUX ÉLÉMENTS HTML =====
    const projectile = document.getElementById('projectile');   // ballon / balle
    const chkAction = document.getElementById('chkAction');     // case "Action"
    const chkReaction = document.getElementById('chkReaction'); // case "Réaction"
    const btnPlay = document.getElementById('btnPlay');         // bouton Play/Stop
    const cowboy = document.getElementById('cowboy');           // image du cow-boy
    const rocket = document.getElementById('rocket');           // image de la fusée

// Flèches d'action (rouges)
    const arrowRocket = document.getElementById('arrowRocket');
    const arrowGunLeft = document.getElementById('arrowGunLeft');
    const arrowGunRight = document.getElementById('arrowGunRight');
    const arrowBalloon = document.getElementById('arrowBalloon');


    
    // ===== PARAMÈTRES GÉNÉRAUX =====
    const duration = 2500; // durée d'une séquence (ms)

    // Positions initiales mémorisées au chargement
    const initialProjectile = { 
      left: parseFloat(getComputedStyle(projectile).left),
      top:  parseFloat(getComputedStyle(projectile).top)
    };
    const initialRocket = {
      left: parseFloat(getComputedStyle(rocket).left),
      top:  parseFloat(getComputedStyle(rocket).top)
    };
    const initialCowboy = {
      bottom: parseFloat(getComputedStyle(cowboy).bottom)
    };

    let isPlaying = false;
    let animationFrameId = null;

    // ===== OUTILS =====

    // Remise à zéro manuelle (on ne l'utilisera plus sur Stop, seulement si besoin plus tard)
    function resetScene() {
      projectile.style.left = initialProjectile.left + 'px';
      projectile.style.top = initialProjectile.top + 'px';
      projectile.style.width = '20px';
      projectile.style.height = '20px';

      rocket.style.left = initialRocket.left + 'px';
      rocket.style.top = initialRocket.top + 'px';

      cowboy.style.bottom = initialCowboy.bottom + 'px';
      cowboy.style.bottom = initialCowboy.bottom + 'px';

      updateActionArrowsVisibility(); // met à jour la visibilité des flèches
    }
// Affiche ou cache les flèches rouges selon la case "Action"
function updateActionArrowsVisibility() {
  const display = chkAction.checked ? 'block' : 'none';
  arrowRocket.style.display = display;
  arrowGunLeft.style.display = display;
  arrowGunRight.style.display = display;
  arrowBalloon.style.display = display;
}

    // Stop : on arrête l'animation où elle est, sans reset
    function stopAnimation() {
      isPlaying = false;
      btnPlay.textContent = 'Play';
      if (animationFrameId !== null) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
    }

    // ===== ANIMATION PRINCIPALE =====
    // Mouvement indépendant des cases Action/Réaction (elles serviront pour les flèches plus tard)

    function playAnimation() {
      // Si déjà en lecture → Stop
      if (isPlaying) {
        stopAnimation();
        return;
      }

      isPlaying = true;
      btnPlay.textContent = 'Stop';

      const startTime = performance.now();

      // On choisit dès le départ un peu d'aléatoire pour la chute du ballon
      const randomOffsetX = (Math.random() - 0.5) * 100; // décalage latéral
      const randomOffsetY = Math.random() * 50;          // variation de profondeur

      function step(now) {
        if (!isPlaying) return; // si Stop a été cliqué

        const t = (now - startTime) / duration; // 0 → 1

        if (t <= 1) {
          // ----- 1) FUSÉE : part du sol, disparaît vers le haut -----
          // On suppose que sa position initiale est "au sol"
          const rocketY = initialRocket.top - 400 * t; // mouvement vertical
          rocket.style.top = rocketY + 'px';
          // On peut diminuer légèrement l'opacité pour simuler la disparition
          rocket.style.opacity = String(1 - 0.3 * t);

          // ----- 2) COW-BOY : vacille, monte un peu, puis redescend -----
          // On découpe en deux phases : 0→0,5 vacillement, 0,5→1 montée+descente
          let cowboyBottom;
          if (t < 0.25) {
            // léger vacillement (montées / descentes rapides de quelques px)
            const localT = t / 0.25; // 0 → 1
            const wobble = Math.sin(localT * Math.PI * 4) * 5; // ±5 px
            cowboyBottom = initialCowboy.bottom + wobble;
          } else {
            // montée puis descente douce
            const localT = (t - 0.25) / 0.75; // 0 → 1
            // parabole : monte jusqu'à +60 px puis redescend
            const jump = 60 * (1 - Math.pow(2 * localT - 1, 2));
            cowboyBottom = initialCowboy.bottom + jump;
          }
          cowboy.style.bottom = cowboyBottom + 'px';

          // ----- 3) BALLON : se dégonfle et tombe -----
          let x, y, size;
          if (t < 0.5) {
            // phase 1 : encore près du cow-boy, commence à se dégonfler
            const localT = t / 0.5; // 0 → 1
            x = initialProjectile.left + randomOffsetX * 0.3 * localT;
            y = initialProjectile.top - 40 * localT;
            size = 20 * (1 - 0.5 * localT); // 20 → 10 px
          } else {
            // phase 2 : chute vers le sol, en continuant à se dégonfler
            const localT = (t - 0.5) / 0.5; // 0 → 1
            x = initialProjectile.left + randomOffsetX;
            y = initialProjectile.top - 40 + (220 + randomOffsetY) * localT;
            size = 10 * (1 - localT); // 10 → 0 px
          }
          const clampedSize = Math.max(size, 2);
          projectile.style.left = x + 'px';
          projectile.style.top = y + 'px';
          projectile.style.width = clampedSize + 'px';
          projectile.style.height = clampedSize + 'px';

          animationFrameId = requestAnimationFrame(step);
        } else {
          // fin de l'animation : on repasse en mode Play, mais on laisse la scène telle quelle
          stopAnimation();
        }
      }

      // On remet la scène à l'état initial avant de relancer un nouveau cycle
      resetScene();
      animationFrameId = requestAnimationFrame(step);
    }

    // ===== ÉCOUTEURS =====
    btnPlay.addEventListener('click', playAnimation);
// On initialise la visibilité des flèches au chargement
updateActionArrowsVisibility();

// Quand on coche/décoche "Action", on ne touche pas au mouvement, seulement aux flèches
chkAction.addEventListener('change', () => {
  updateActionArrowsVisibility();
});

    // Les cases Action / Réaction ne changent plus le mouvement (elles seront utilisées pour les flèches)
  </script>

 <!-- ===== FIN SCRIPT ANIMATION ACTION/RÉACTION ===================================================================== --> 


</body>
</html>
